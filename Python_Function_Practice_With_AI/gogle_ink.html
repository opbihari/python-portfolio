<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PYTHON — Ink Reference</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&family=Lora:ital,wght@0,400;0,700;1,400&family=Merriweather:wght@400;700&family=Nunito:wght@400;600;700&family=Caveat:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --seal-red: #D32F2F;   
  --ink-black: #0F0F0F;  
  --ink-dark: #2A2A2A;   
  --ink-gray: #555555;   
  --ink-light: #999999;  
  --paper-bg: #FFFFFF;   
  --paper-card: #FAFAFA; 
  --code-bg: #f9f9f9;
  --nav-bg: rgba(255,255,255,0.9);
  --node-bg: rgba(255,255,255,0.7);
  --node-bg-hover: rgba(255,255,255,0.9);
  --border-color: #eeeeee;

  --font-hand: 'Caveat', cursive;
  --font-read: 'Inter', system-ui, -apple-system, sans-serif;
  --font-code: 'Fira Code', monospace;
}

body.dark-mode {
  --seal-red: #EF5350;   
  --ink-black: #E0E0E0;  
  --ink-dark: #BDBDBD;   
  --ink-gray: #9E9E9E;   
  --ink-light: #616161;  
  --paper-bg: #121212;   
  --paper-card: #1E1E1E;
  --code-bg: #2A2A2A;
  --nav-bg: rgba(18, 18, 18, 0.9);
  --node-bg: rgba(30, 30, 30, 0.7);
  --node-bg-hover: rgba(30, 30, 30, 0.9);
  --border-color: #333333;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background-color: var(--paper-bg);
  color: var(--ink-black);
  font-family: var(--font-read);
  font-size: 1.15rem;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  transition: background-color 0.3s ease, color 0.3s ease;
}

/* Texture Overlay */
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}

/* Background Elements */
.bg-sun {
  position: fixed; top: -5vh; right: -5vw; width: 35vw; height: 35vw;
  background: var(--seal-red); border-radius: 50%; z-index: 0; opacity: 0.8;
  filter: url(#roughEdge); pointer-events: none;
}

.bg-mountains {
  position: fixed; bottom: 0; left: 0; width: 100%; height: 25vh;
  z-index: 0; pointer-events: none; opacity: 0.5;
}

/* Custom Image Background Overlay */
#customBgContainer {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  mix-blend-mode: multiply;
  opacity: 0.85;
  transition: background-image 0.5s ease, opacity 0.5s ease;
  display: none;
}

/* ROUTING */
.view {
  display: none; width: 100%; min-height: 100vh;
  animation: fadeIn 0.6s ease forwards;
}
.view.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* HEADER */
header{position:relative;z-index:10;text-align:center;padding:2rem 1rem 1rem;}
.logo-container { display: flex; justify-content: center; align-items: center; gap: 15px; }
.logo{
  font-family: var(--font-read);
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: 900;
  color: var(--ink-black);
  letter-spacing: 0.05em;
}
.seal {
  background: var(--seal-red);
  color: #fff;
  font-family: var(--font-read);
  font-weight: 700;
  font-size: 1.5rem;
  width: 42px;
  height: 42px;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 2px;
  box-shadow: 2px 3px 0 rgba(0,0,0,0.1);
  transform: rotate(-3deg);
  filter: url(#inkText);
}
.logo-sub{font-family:var(--font-hand);font-size:1.6rem;color:var(--ink-gray);letter-spacing:0.1em;margin-top:0.2rem;}

.map-controls {
  display: flex; gap: 15px; justify-content: center; align-items: center; margin-top: 1rem; position: relative; z-index: 10; flex-wrap: wrap;
}

/* STATS & TABS */
.stats{display:flex;justify-content:center;gap:2rem;flex-wrap:wrap;padding:0.5rem;font-family:var(--font-read);font-size:.85rem;color:var(--ink-gray);position:relative;z-index:10; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;}
.sn{color:var(--seal-red); font-weight: 900;}

#TB { display: flex; justify-content: center; gap: 10px; padding: 1rem; flex-wrap: wrap; position: relative; z-index: 10; }
.tab { font-family: var(--font-read); font-size: 0.9rem; padding: 0.4rem 1rem; font-weight: bold; text-transform: uppercase; border: 1px solid var(--ink-light); border-radius: 20px; background: transparent; color: var(--ink-gray); cursor: pointer; transition: all 0.2s; }
.tab:hover, .tab.active { background: var(--seal-red); border-color: var(--seal-red); color: white; }

/* DRAGON MAP VIEW (2D CANVAS) */
#mapContainer {
  position: relative; width: 100%; max-width: 1200px;
  margin: 1rem auto 2rem; height: 65vh; min-height: 450px;
  filter: contrast(1.1) drop-shadow(2px 4px 6px rgba(0,0,0,0.1));
}
#mapCanvas {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; mix-blend-mode: multiply; pointer-events: none;
}
#nodeLayer {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
}
.map-node {
  position: absolute; display: flex; flex-direction: column;
  align-items: center; cursor: pointer; z-index: 100;
  pointer-events: auto;
  transform: translate(-50%, -50%);
}
.node-pearl {
  width: 16px; height: 16px; background: var(--ink-black);
  border-radius: 50%; box-shadow: 1px 1px 3px rgba(0,0,0,0.3);
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.27);
  filter: url(#inkText);
}
.node-label {
  margin-top: 6px; font-family: var(--font-hand); font-size: 1.3rem;
  font-weight: bold; background: var(--node-bg); color: var(--ink-black);
  padding: 2px 8px; border-radius: 4px; white-space: nowrap; transition: all 0.3s;
}
.map-node:hover .node-pearl { transform: scale(1.8); background: var(--seal-red); }
.map-node:hover .node-label { color: var(--seal-red); transform: scale(1.1); background: var(--node-bg-hover); }
.map-node.active .node-pearl { transform: scale(2.2); background: var(--seal-red); border: 2px solid var(--paper-bg); border-radius: 2px; }
.map-node.active .node-label { color: var(--seal-red); font-weight: 900; background: var(--node-bg-hover); }

/* ANIMATION PANEL */
#animationPanel {
  display: none; padding: 1rem 1.5rem; background: var(--nav-bg);
  border: 1px solid var(--border-color); border-radius: 4px; margin: 1rem auto; 
  position: relative; z-index: 50; max-width: 600px; text-align: left;
}
.anim-title { font-family: var(--font-read); font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem; color: var(--seal-red); }
.anim-controls { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }

/* CONTENT VIEW */
.content-nav {
  position: sticky; top: 0; z-index: 200; background: var(--nav-bg);
  padding: 1rem 2rem; display: flex; gap: 20px; align-items: center; justify-content: center;
  border-bottom: 1px solid var(--border-color); backdrop-filter: blur(10px); flex-wrap: wrap;
}
.sw{position:relative;flex:1;min-width:250px;max-width:400px;}
.sw span{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--ink-black);font-family:var(--font-code);font-weight: bold;pointer-events:none}
#Q{width:100%;background:transparent;border:none;border-bottom:2px solid var(--ink-light);color:var(--ink-black);font-family:var(--font-code);font-size:1.05rem;padding:.65rem 1rem .65rem 2.4rem;outline:none;transition:all 0.3s;}
#Q::placeholder{color:var(--ink-light); font-family: var(--font-read); font-style: italic;}
#Q:focus{border-bottom-color:var(--seal-red);background:var(--code-bg);}

main { padding: 2rem; max-width: 1400px; margin: 0 auto; position: relative; z-index: 10; }

.section { margin-bottom: 2rem; }
.sec-hdr { display: flex; align-items: center; margin-bottom: 1rem; font-family: var(--font-read); font-weight: 900; font-size: 1.5rem; }
.sec-line { flex: 1; height: 1px; background: currentColor; margin: 0 15px; opacity: 0.3; }
.sec-cnt { font-family: var(--font-code); font-size: 1rem; opacity: 0.7; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.card {
  background: var(--paper-card); border: 1px solid var(--border-color); border-top: 4px solid var(--ink-black);
  padding: 20px; border-radius: 2px; cursor: pointer; transition: all 0.3s; position: relative;
}
.card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
.card.active-card { transform: scale(0.95); opacity: 0.5; }
.card-title { font-family: var(--font-code); font-size: 1.2rem; font-weight: bold; color: var(--ink-black); margin-bottom: 8px; }
.card-desc { font-family: var(--font-read); font-size: 1rem; color: var(--ink-gray); }
.card-hint { font-family: var(--font-code); font-size: 0.8rem; color: var(--seal-red); margin-top: 10px; opacity: 0; transition: opacity 0.3s; }
.card:hover .card-hint { opacity: 1; }

#panel {
  position: fixed; bottom: 0; left: 0; right: 0; background: var(--paper-bg);
  border-top: 4px solid var(--ink-black); z-index: 500; height: 75vh;
  display: none; flex-direction: column; box-shadow: 0 -20px 50px rgba(0,0,0,0.3);
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.27), height 0.3s ease;
}
#panel.open { display: flex; transform: translateY(0); }

/* Left & Right Pane layout structure */
.panel-body { display: flex; width: 100%; flex: 1; overflow: hidden; }
.pane { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 1.5rem; transition: all 0.3s ease; }
#leftPane { border-right: 1px solid var(--border-color); }
@media(max-width: 800px) { .panel-body { flex-direction: column; } #leftPane { border-right: none; border-bottom: 1px solid var(--border-color); } }

#codeArea, #outBox {
  font-family: var(--font-code); font-size: 0.9rem; padding: 15px;
  background: var(--code-bg); border: 1px solid var(--border-color); border-radius: 2px; width: 100%;
  color: var(--ink-black); transition: height 0.3s ease;
}
#outBox.err { border-left-color: var(--seal-red); color: var(--seal-red); background: rgba(211,47,47,0.03); }
#outBox.ok { border-left-color: #2e8b57; }

.pane-header {
  display: flex; justify-content: space-between; align-items: center; 
  border-bottom: 1px dashed var(--border-color); margin-bottom: 10px; padding-bottom: 4px;
}
.pane-label {
  font-family: var(--font-read); font-size: 0.9rem; font-weight: bold;
  color: var(--ink-gray); text-transform: uppercase;
}

/* AI Sage Styling */
#aiBox {
  background: var(--paper-bg); border: 1px solid var(--border-color); border-left: 4px solid var(--seal-red);
  padding: 15px; margin-top: 15px; border-radius: 2px; font-family: var(--font-read);
  font-size: 1rem; display: none; line-height: 1.6; animation: fadeIn 0.4s ease;
  transition: max-height 0.3s ease;
}
#aiBox strong { color: var(--seal-red); }
#aiBox code { font-family: var(--font-code); font-size: 0.9em; }

.action-btn {
  font-family: var(--font-read); font-size: 0.9rem; padding: 0.4rem 1.2rem; font-weight: bold;
  border: 1px solid var(--seal-red); border-radius: 2px; background: transparent;
  color: var(--seal-red); cursor: pointer; transition: all 0.2s; text-transform: uppercase;
}
.action-btn:hover:not(:disabled) { background: var(--seal-red); color: white; }
.action-btn:disabled { opacity: 0.5; cursor: wait; border-color: var(--ink-light); color: var(--ink-light); }

.custom-input {
  width:100%; background: var(--paper-bg); color:var(--ink-black); border: 1px solid var(--border-color); 
  border-radius:2px; padding: 10px 12px; font-family:var(--font-read); font-size:1rem; 
  margin-bottom: 8px; outline:none; transition:all 0.2s;
}
.custom-input:focus { border-color: var(--seal-red); box-shadow: 0 0 0 2px rgba(211,47,47,0.1); }
#noteCode, #aiGenPrompt { font-family: var(--font-code); font-size: 0.9rem; }

.pulsate { animation: pulse 1.5s infinite; }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

</style>
</head>
<body>

<svg style="position:absolute; height:0; width:0;">
  <filter id="roughEdge">
    <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" />
    <feDisplacementMap in="SourceGraphic" scale="15" />
  </filter>
  <filter id="inkText">
    <feTurbulence type="fractalNoise" baseFrequency="0.12" numOctaves="3" />
    <feDisplacementMap in="SourceGraphic" scale="2.5" />
  </filter>
</svg>

<div class="bg-sun"></div>
<div id="customBgContainer"></div>

<!-- SECURE HIDDEN INPUTS WITH BOUND EVENT LISTENERS -->
<input type="file" id="fullBgInput" accept="image/*" style="display:none;" />
<input type="file" id="mapImageInput" accept="image/*" style="display:none;" onchange="handleMapImage(event)" />
<input type="file" id="bgFileInput" accept="image/*" style="display:none;" onchange="handleBgFile(event)" />
<input type="file" id="fileInput" accept="image/*,video/mp4,video/webm" style="display:none;" onchange="handleNoteMedia(event)" />

<div id="flash"></div>

<!-- MAP VIEW -->
<div id="view-map" class="view active">
  <header>
    <div class="logo-container">
      <div class="logo">PYTHON</div>
      <div class="seal">PY</div>
    </div>
    <div class="logo-sub">Interactive Map System</div>
  </header>

  <div class="map-controls">
    <button id="toggleAnimBtn" class="action-btn" style="color:var(--ink-gray);border-color:var(--ink-light)" onclick="toggleAnimationPanel()">⚙️ SETTINGS</button>
  </div>

  <div id="animationPanel">
    <div class="anim-title">⚙️ Settings</div>
    
    <div style="margin-bottom:1rem; padding-bottom:1rem; border-bottom:1px dashed var(--border-color);">
      <label style="display:block;font-size:0.9rem;margin-bottom:0.5rem;font-weight:600">Font Style:</label>
      <select id="fontSelect" class="custom-input" style="font-family:var(--font-code); font-size: 0.9rem;" onchange="changeFontTheme(this.value)">
        <option value="Inter">Inter (Modern Sans)</option>
        <option value="Roboto">Roboto (Clean Sans)</option>
        <option value="Nunito">Nunito (Rounded Sans)</option>
        <option value="Lora">Lora (Elegant Serif)</option>
        <option value="Merriweather">Merriweather (Classic Serif)</option>
      </select>
    </div>

    <div style="margin-bottom:1rem; padding-bottom:1rem; border-bottom:1px dashed var(--border-color);">
      <label style="display:block;font-size:0.9rem;margin-bottom:0.5rem;font-weight:600">Theme:</label>
      <button id="toggleThemeBtn" class="action-btn" style="width:100%; color:var(--ink-gray);border-color:var(--ink-light)" onclick="toggleTheme()">🌙 ENABLE DARK MODE</button>
    </div>

    <div style="margin-bottom:1rem; padding-bottom:1rem; border-bottom:1px dashed var(--border-color);">
      <label style="display:block;font-size:0.9rem;margin-bottom:0.5rem;font-weight:600">Built-in AI Persona:</label>
      <select id="aiPersonaSelect" class="custom-input" style="font-family:var(--font-code); font-size: 0.9rem;" onchange="changeAIPersona(this.value)">
        <option value="sage">Ancient Sage (Themed)</option>
        <option value="standard">Standard Assistant (Normal)</option>
      </select>
    </div>

    <div style="margin-bottom:1rem; padding-bottom:1rem; border-bottom:1px dashed var(--border-color);">
      <label style="display:block;font-size:0.9rem;margin-bottom:0.5rem;font-weight:600">Custom Gemini API Key (Optional):</label>
      <div style="display:flex; gap:10px;">
        <input id="apiInput" type="password" class="custom-input" placeholder="Leave blank to use default..." style="margin-bottom:0; flex:1; font-family:var(--font-code); font-size: 0.8rem;" />
        <button id="saveApiBtn" class="action-btn" onclick="saveApiKey()">SAVE</button>
      </div>
      <div style="font-size: 0.8rem; color: var(--ink-gray); margin-top: 5px;">Uses default keyless gateway if empty.</div>
    </div>

    <div style="margin-bottom:1rem; padding-bottom:1rem; border-bottom:1px dashed var(--border-color);">
      <label style="display:block;font-size:0.9rem;margin-bottom:0.5rem;font-weight:600">Custom Wallpaper:</label>
      <button id="toggleFullBgBtn" class="action-btn" style="width:100%; color:var(--ink-gray);border-color:var(--ink-light)" onclick="toggleFullBg()">🖼️ UPLOAD WALLPAPER</button>
    </div>

    <div style="margin-bottom:1rem;">
      <label style="display:block;font-size:0.9rem;margin-bottom:0.5rem;font-weight:600">Map Image:</label>
      <div class="anim-controls">
        <button id="useImageBtn" class="action-btn" onclick="document.getElementById('mapImageInput').click()">📸 UPLOAD MAP IMAGE</button>
        <button id="useDefaultBtn" class="action-btn" style="color:var(--ink-gray); border-color:var(--ink-light)" onclick="useDefaultDragon()">🐲 USE DEFAULT</button>
      </div>
    </div>
    
    <div style="margin-bottom:0.5rem;">
      <label style="display:block;font-size:0.9rem;margin-bottom:0.5rem;font-weight:600">Node Animation Style:</label>
      <select id="animTypeSelect" class="custom-input" style="font-family:var(--font-code); max-width:300px; font-size: 0.9rem;" onchange="changeAnimType(this.value)">
        <option value="float">Gentle Float (Default)</option>
        <option value="wave">Wave Motion</option>
        <option value="orbit">Orbital Path</option>
        <option value="pulse">Pulsing Nodes</option>
        <option value="spin">Rotating Spin</option>
        <option value="static">Static (No Animation)</option>
      </select>
    </div>
  </div>

  <div id="mapContainer">
    <canvas id="mapCanvas"></canvas>
    <div id="nodeLayer"></div>
  </div>
</div>

<!-- CONTENT VIEW -->
<div id="view-content" class="view">
  <div class="content-nav">
    <button id="backBtn" class="action-btn" style="color:var(--ink-black);border-color:var(--ink-black)" onclick="switchView('view-map'); closePanel();">← RETURN TO MAP</button>
    <div style="font-family: var(--font-hand); font-size: 2rem; color: var(--seal-red); margin: 0 15px;" id="activeCategoryTitle">Category</div>
    <div class="sw">
      <span>▸</span><input id="Q" type="text" placeholder="Search keyword or method..." autocomplete="off" spellcheck="false" oninput="handleSearch()" />
    </div>
    <button id="toggleNotesBtn" class="action-btn" onclick="toggleNotes()">➕ ADD NOTE</button>
    <button id="toggleAISageBtn" class="action-btn" onclick="toggleAISagePanel()">✨ ASK SAGE</button>
  </div>
  
  <div id="TB"></div>
  
  <div class="stats">
    <span>TOTAL <span class="sn" id="sT">0</span></span>
    <span>VISIBLE <span class="sn" id="sV">0</span></span>
    <span>CATEGORIES <span class="sn">11</span></span>
    <span>RUNTIME <span class="sn" id="sP">LOADING…</span></span>
  </div>

  <div id="aiMeditationBox" style="display:none; max-width: 800px; margin: 2rem auto; padding: 20px; background: var(--paper-bg); border: 1px solid var(--border-color); border-top: 4px solid var(--seal-red);">
    <div class="pane-label" style="border:none; margin-bottom:10px;" id="aiMeditationTitle">MEDITATE WITH THE AI SAGE</div>
    <input id="aiGenPrompt" class="custom-input" type="text" placeholder="What code shall I write for you today?" style="width:100%; border:1px solid var(--border-color); padding: 10px;" />
    <button id="aiGenBtn" class="action-btn" style="margin-top:10px" onclick="aiGenerateSnippet()">✨ CONJURE CODE</button>
  </div>

  <div id="notesContainer" style="display:none; padding: 0 1.5rem 2rem; max-width: 1000px; margin: 0 auto; animation: fadeIn .4s ease forwards;">
    <div class="card" style="border-top: 3px solid var(--seal-red); cursor: default;">
      <div class="pane-label" style="border:none; margin-bottom:10px;">CREATE NEW INK NOTE</div>
      <input id="noteTitle" class="custom-input" style="font-weight:bold;" type="text" placeholder="TITLE (e.g. My Snippet)" spellcheck="false" />
      <input id="noteDesc" class="custom-input" type="text" placeholder="SHORT DESCRIPTION..." spellcheck="false" />
      <div style="display:flex; gap:8px; margin-bottom: 8px;">
        <input id="noteMedia" class="custom-input" type="text" placeholder="MEDIA URL OR DRAG & DROP FILE HERE... (Max 2.5MB)" spellcheck="false" style="flex:1; margin-bottom:0;" 
           ondragover="event.preventDefault(); this.style.borderColor='var(--seal-red)'; this.style.background='rgba(211,47,47,0.05)';"
           ondragleave="event.preventDefault(); this.style.borderColor='var(--border-color)'; this.style.background='var(--paper-bg)';"
           ondrop="event.preventDefault(); this.style.borderColor='var(--border-color)'; this.style.background='var(--paper-bg)'; if(event.dataTransfer.files && event.dataTransfer.files[0]) processLocalFile(event.dataTransfer.files[0]);"
        />
        <button id="browseBtn" class="action-btn" style="color: var(--ink-black); border-color: var(--ink-black);" onclick="document.getElementById('fileInput').click()">📁 BROWSE</button>
      </div>
      <textarea id="noteCode" class="custom-input" spellcheck="false" placeholder="# Write your code snippet here..." style="min-height: 140px; margin-bottom:0;" onkeydown="handleCodeTab(event)"></textarea>

function escH(s){
  if(!s) return "";
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function pyHL(code){
  if(!code) return "";
  let s = escH(code);
  s = s.replace(/(&quot;.*?&quot;|'.*?')/g, '<span style="color:seagreen">$1</span>');
  s = s.replace(/(#.*)/g, '<span style="color:var(--ink-light); font-style:italic;">$1</span>');
  s = s.replace(/\b(def|class|if|elif|else|while|for|try|except|finally|with|as|return|yield|import|from|pass|break|continue|and|or|not|in|is|lambda|global|nonlocal|True|False|None)\b/g, '<span style="color:var(--seal-red); font-weight:bold;">$1</span>');
  return s;
}

let animCanvas, animCtx, nodeLayer;
let mapNodes = [];
let animRequestId;
let mapImage = new Image();
let imageLoaded = false;

mapImage.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Nine_Dragons_detail_%28Chen_Rong%29.jpg/1200px-Nine_Dragons_detail_%28Chen_Rong%29.jpg';
mapImage.onload = () => { imageLoaded = true; };

const defaultDragonPositions = [
    { id: 'kw', x: 0.20, y: 0.40 },
    { id: 'builtin', x: 0.30, y: 0.60 },
    { id: 'str', x: 0.40, y: 0.80 },
    { id: 'list', x: 0.48, y: 0.60 },
    { id: 'dict', x: 0.55, y: 0.40 },
    { id: 'set', x: 0.68, y: 0.35 },
    { id: 'file', x: 0.80, y: 0.25 },
    { id: 'csv', x: 0.88, y: 0.45 },
    { id: 'iter', x: 0.75, y: 0.65 },
    { id: 'exc', x: 0.60, y: 0.75 },
    { id: 'custom', x: 0.90, y: 0.75 }
];

function initMapCanvas() {
    const container = document.getElementById('mapContainer');
    if(!container) return;
    animCanvas = document.getElementById('mapCanvas');
    nodeLayer = document.getElementById('nodeLayer');
    
    if(!animCanvas) return;
    animCanvas.width = container.clientWidth;
    animCanvas.height = container.clientHeight;
    animCtx = animCanvas.getContext('2d');
    
    generateNodes();
    if(animRequestId) cancelAnimationFrame(animRequestId);
    animate2D();
}

function generateNodes() {
    if(!nodeLayer) return;
    nodeLayer.innerHTML = '';
    mapNodes = [];
    
    const isDefault = (animationState.type === 'image' && mapImage.src.includes('image_95bdfc.png'));
    const mapCats = CATS.filter(c => c.id !== 'all');

    mapCats.forEach((cat, idx) => {
        let basePathX, basePathY;
        
        if (isDefault) {
            basePathX = defaultDragonPositions[idx].x;
            basePathY = defaultDragonPositions[idx].y;
        } else {
            basePathX = 0.1 + (idx / (mapCats.length - 1)) * 0.8;
            basePathY = 0.5 + Math.sin((idx / (mapCats.length - 1)) * Math.PI * 2) * 0.3;
        }

        const el = document.createElement('div');
        el.className = 'map-node';
        el.setAttribute('data-cat', cat.id);
        
        const dot = document.createElement('div');
        dot.className = 'node-pearl';
        const label = document.createElement('div');
        label.className = 'node-label';
        label.textContent = cat.label.split(' ')[0];
        
        el.appendChild(dot);
        el.appendChild(label);
        
        el.onclick = () => {
            activeCat = cat.id;
            updateMapVisuals();
            renderContent();
            switchView('view-content');
        };
        
        nodeLayer.appendChild(el);
        
        mapNodes.push({
            catId: cat.id,
            el: el,
            baseX: basePathX,
            baseY: basePathY,
            timeOffset: idx * 0.5,
            scale: 1,
            rotation: 0
        });
    });
    
    updateMapVisuals();
}

function animate2D() {
    animRequestId = requestAnimationFrame(animate2D);
    if (!animCanvas || !animCtx) return;
    
    const width = animCanvas.width;
    const height = animCanvas.height;
    
    animCtx.clearRect(0, 0, width, height);

    if (animationState.type === 'image' && imageLoaded) {
        const imgRatio = mapImage.width / mapImage.height;
        const canvasRatio = width / height;
        let drawW = width, drawH = height;
        let drawX = 0, drawY = 0;

        if (imgRatio > canvasRatio) {
            drawH = width / imgRatio;
            drawY = (height - drawH) / 2;
        } else {
            drawW = height * imgRatio;
            drawX = (width - drawW) / 2;
        }

        animCtx.globalCompositeOperation = 'multiply';
        animCtx.drawImage(mapImage, drawX, drawY, drawW, drawH);
        animCtx.globalCompositeOperation = 'source-over';
    }

    animCtx.beginPath();
    animCtx.strokeStyle = document.body.classList.contains('dark-mode') ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.15)';
    animCtx.lineWidth = 1;
    animCtx.setLineDash([5, 5]);

    const time = Date.now() * 0.001;

    mapNodes.forEach((node, idx) => {
        let offsetX = 0;
        let offsetY = 0;
        node.scale = 1;
        node.rotation = 0;

        switch(animationState.animType) {
            case 'float':
                offsetY = Math.sin(time * 2 + node.timeOffset) * 10;
                break;
            case 'wave':
                offsetX = Math.cos(time * 2 + idx) * 15;
                offsetY = Math.sin(time * 2 + idx) * 15;
                break;
            case 'pulse':
                node.scale = 1 + Math.sin(time * 3 + node.timeOffset) * 0.2;
                break;
            case 'orbit':
                offsetX = Math.cos(time + node.timeOffset) * 20;
                offsetY = Math.sin(time + node.timeOffset) * 20;
                break;
            case 'spin':
                node.rotation = (time * 50) % 360;
                break;
            case 'static':
            default:
                break;
        }

        const finalX = (node.baseX * width) + offsetX;
        const finalY = (node.baseY * height) + offsetY;

        if (idx === 0) animCtx.moveTo(finalX, finalY);
        else animCtx.lineTo(finalX, finalY);

        node.el.style.left = `${finalX}px`;
        node.el.style.top = `${finalY}px`;
        
        const dot = node.el.querySelector('.node-pearl');
        if (dot) {
            if(!node.el.classList.contains('active')) {
                 dot.style.transform = `scale(${node.scale}) rotate(${node.rotation}deg)`;
            } else {
                 dot.style.transform = `scale(2.2)`; 
            }
        }
    });

    animCtx.stroke();
    animCtx.setLineDash([]);
}

function updateMapVisuals() {
  document.querySelectorAll('.map-node').forEach(node => {
    if (node.getAttribute('data-cat') === activeCat) node.classList.add('active');
    else node.classList.remove('active');
  });
}

async function callGeminiAPI(prompt, isJson = false) {
  const keyToUse = customApiKey || apiKey;
  const delays = [1000, 2000, 4000, 8000, 16000];
  
  const isSage = aiPersona === 'sage';
  const sysPrompt = isSage 
      ? "You are a wise Python AI sage living in an ancient ink-wash scroll. Provide clear, concise, and elegantly formatted advice. Always wrap code blocks in triple backticks."
      : "You are an expert Python programming assistant. Provide clear, concise, and highly accurate advice. Always wrap code blocks in triple backticks.";

  // LOCAL DEVICE FALLBACK: Free AI gateway when API key is missing
  if (!keyToUse) {
    const fallbackUrl = 'https://text.pollinations.ai/';
    const fallbackMessage = isJson 
        ? sysPrompt + "\n\nUser Request: Write a Python snippet for: " + prompt + "\n\nCRITICAL: Return ONLY a raw, valid JSON object with exact keys: title, desc, code. Do NOT wrap it in markdown backticks. Do not add any conversational text."
        : sysPrompt + "\n\nUser Request: " + prompt;

    for (let i = 0; i < 5; i++) {
      try {
        const res = await fetch(fallbackUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [
              { role: 'system', content: sysPrompt },
              { role: 'user', content: fallbackMessage }
            ]
          })
        });
        if (!res.ok) throw new Error("Fallback Failed");
        
        let text = await res.text();
        
        // Failsafe extraction if API unexpectedly returns OpenAI JSON wrapper
        try {
            const parsed = JSON.parse(text);
            if (parsed.choices?.[0]?.message?.content) {
                text = parsed.choices[0].message.content;
            }
        } catch(e) {} // Not JSON wrapper, use raw text
        
        // REMOVE INJECTED ADS: Snip off common free-API promotional footers
        text = text.split(/\n\n(?:\**Advertisement\**|\**Sponsored\**|Check out|Support us|Powered by|Generated by|\[ad\])/i)[0];
        
        return text.trim();
      } catch (e) {
        if (i === 4) throw e;
        await new Promise(r => setTimeout(r, delays[i]));
      }
    }
  }

  // NATIVE GEMINI LOGIC
  const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=' + keyToUse;
  const payload = {
    contents: [{ parts: [{ text: prompt }] }],
    systemInstruction: { parts: [{ text: sysPrompt }] }
  };
  
  if (isJson) {
    payload.generationConfig = {
      responseMimeType: "application/json",
      responseSchema: {
        type: "OBJECT",
        properties: {
          title: { type: "STRING" },
          desc: { type: "STRING" },
          code: { type: "STRING" }
        },
        required: ["title", "desc", "code"]
      }
    };
  }

  for (let i = 0; i < 5; i++) {
    try {
      const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      if (!res.ok) throw new Error("API Request Failed");
      const data = await res.json();
      return data.candidates[0].content.parts[0].text;
    } catch (e) {
      if (i === 4) throw e;
      await new Promise(r => setTimeout(r, delays[i]));
    }
  }
}

function formatAIMarkdown(text) {
  let processed = text || "";
  let blocks = [];
  
  // Clean up any stray JSON wrappings just in case
  try {
      const parsed = JSON.parse(processed);
      if (parsed.choices?.[0]?.message?.content) {
          processed = parsed.choices[0].message.content;
      }
  } catch(e) {}

  // Fix literal double-escaped newlines injected by some APIs
  processed = processed.replace(/\\n/g, '\n').replace(/\\"/g, '"');
  
  // Safely define backticks so the system parser doesn't break the script block!
  const tick = String.fromCharCode(96);
  const tripleTick = tick + tick + tick;
  
  const pyRegex = new RegExp(tripleTick + '(?:python|py)?\\s*\\n([\\s\\S]*?)' + tripleTick, 'gi');
  processed = processed.replace(pyRegex, (m, c) => {
    blocks.push('<div style="background:var(--code-bg); padding:10px; border-left:3px solid var(--seal-red); margin:10px 0; overflow-x:auto; font-family:var(--font-code);"><code>' + pyHL(c.trim()) + '</code></div>');
    return '__BLOCK_' + (blocks.length - 1) + '__';
  });
  
  const stdRegex = new RegExp(tripleTick + '([\\s\\S]*?)' + tripleTick, 'g');
  processed = processed.replace(stdRegex, (m, c) => {
    blocks.push('<div style="background:var(--code-bg); padding:10px; border-left:3px solid var(--seal-red); margin:10px 0; overflow-x:auto; font-family:var(--font-code);"><code>' + escH(c.trim()) + '</code></div>');
    return '__BLOCK_' + (blocks.length - 1) + '__';
  });

  processed = escH(processed);

  const inlineRegex = new RegExp(tick + '([^' + tick + ']+)' + tick, 'g');
  processed = processed.replace(inlineRegex, '<code style="background:var(--code-bg); padding:2px 4px; border-radius:3px; font-family:var(--font-code); color:var(--seal-red);">$1</code>');
  processed = processed.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  processed = processed.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  
  blocks.forEach((block, i) => {
    processed = processed.replace('__BLOCK_' + i + '__', block);
  });

  processed = processed.replace(/\n/g, '<br>');
  return processed;
}

async function aiGenerateSnippet() {
  const promptInput = document.getElementById('aiGenPrompt');
  if(!promptInput) return;
  const promptText = promptInput.value;
  if (!promptText) return;
  
  const btn = document.getElementById('aiGenBtn');
  if(btn) { btn.disabled = true; btn.innerText = "THINKING..."; }
  
  try {
    let response = await callGeminiAPI(promptText, true);
    
    // Fallback extraction: Some APIs wrap JSON in markdown despite instructions
    const tick = String.fromCharCode(96);
    const triple = tick + tick + tick;
    const rx1 = new RegExp(triple + '(?:json)?\\s*\\n?', 'gi');
    const rx2 = new RegExp(triple, 'g');
    response = response.replace(rx1, '').replace(rx2, '').trim();
    
    const start = response.indexOf('{');
    const end = response.lastIndexOf('}');
    if (start !== -1 && end !== -1) {
        response = response.substring(start, end + 1);
    }
    
    const result = JSON.parse(response);
    
    DATA.push({ cat: 'custom', code: result.title, desc: result.desc, ex: result.code });
    renderContent();
    
    const box = document.getElementById('aiMeditationBox');
    if (box) box.style.display = 'none';
    promptInput.value = "";
    
  } catch (e) {
    const errorMsg = aiPersona === 'sage' ? "The Sage is silent. Please wait a moment or check your API key." : "The AI is unresponsive. Please wait a moment or check your API key.";
    alert(errorMsg);
  } finally {
    if(btn) { btn.disabled = false; btn.innerText = "✨ CONJURE CODE"; }
  }
}

function renderContent() {
  const tb = document.getElementById('TB');
  if (tb) {
      tb.innerHTML = '';
      CATS.forEach(c => {
          const t = document.createElement('button');
          t.className = `tab ${c.id === activeCat ? 'active' : ''}`;
          t.textContent = c.label;
          t.onclick = () => { activeCat = c.id; updateMapVisuals(); renderContent(); };
          tb.appendChild(t);
      });
  }

  const qInput = document.getElementById('Q');
  const q = qInput ? qInput.value.toLowerCase() : '';
  const mc = document.getElementById('MC');
  
  const titleEl = document.getElementById('activeCategoryTitle');
  if (titleEl) titleEl.innerText = (activeCat === 'all' ? 'All Scrolls' : CATS.find(c=>c.id===activeCat)?.label || 'Results');
  
  const filtered = DATA.filter(d => (activeCat === 'all' || d.cat === activeCat) && (d.code.toLowerCase().includes(q) || d.desc.toLowerCase().includes(q)));
  
  const st_el = document.getElementById('sT');
  const sv_el = document.getElementById('sV');
  if (st_el) st_el.textContent = DATA.length;
  if (sv_el) sv_el.textContent = filtered.length;

  if (!mc) return;

  if (filtered.length === 0) { 
      mc.innerHTML = '<div style="text-align:center; padding:2rem; color:var(--ink-gray);"><b>∅</b> The scroll is blank.</div>'; 
      return; 
  }
  
  const groups = {};
  filtered.forEach(item => {
      if(!groups[item.cat]) groups[item.cat] = [];
      groups[item.cat].push(item);
  });

  let html = '';
  ORDER.forEach(cat => {
      if(groups[cat]) {
          html += `
          <div class="section" style="margin-bottom: 2rem;">
            <div class="sec-hdr" style="display:flex; align-items:center; margin-bottom:1rem; color:${getColor(cat)}; font-weight:bold; font-size:1.3rem;">
              <span>${CLABEL[cat]}</span>
              <span style="flex:1; height:1px; background:currentColor; margin:0 15px; opacity:0.3;"></span>
              <span style="font-size:1rem; opacity:0.8;">[${groups[cat].length}]</span>
            </div>
            <div class="grid">
              ${groups[cat].map((item, i) => {
                const safeCode = item.code.replace(/'/g,"\\'").replace(/"/g,'&quot;');
                return `<div class="card" style="border-top-color:${getColor(item.cat)}; animation-delay:${i*0.03}s" onclick="openPanel('${safeCode}')">
                           <div class="card-title">${item.code}</div>
                           <div class="card-desc">${item.desc}</div>
                         </div>`;
              }).join('')}
            </div>
          </div>`;
      }
  });

  mc.innerHTML = html;
}

function openPanel(code) {
  if (isSageExpanded) toggleSageExpand();
  if (isLeftExpanded) toggleLeftExpand();
  if (isRightExpanded) toggleRightExpand();

  const item = DATA.find(d => d.code === code);
  if (!item) return;
  
  const pMethod = document.getElementById('pMethod');
  if(pMethod) {
      pMethod.innerText = item.code;
      pMethod.style.color = getColor(item.cat);
  }
  
  const pDesc = document.getElementById('pDesc');
  if(pDesc) pDesc.innerText = item.desc;
  
  const exCode = document.getElementById('exCode');
  if(exCode) exCode.innerHTML = pyHL(item.ex);
  
  const codeArea = document.getElementById('codeArea');
  if(codeArea) codeArea.value = item.ex;
  
  const pm = document.getElementById('panelMedia');
  if (pm) {
      if(item.media) {
        pm.style.display = 'block';
        let mUrl = item.media;
        if (mUrl.includes('youtube.com/watch?v=')) mUrl = mUrl.replace('watch?v=', 'embed/').split('&')[0];
        else if (mUrl.includes('youtu.be/')) mUrl = mUrl.replace('youtu.be/', 'www.youtube.com/embed/').split('?')[0];
        const isVideo = mUrl.match(/\.(mp4|webm|ogg)$/i) || mUrl.startsWith('data:video/');
        if(isVideo) pm.innerHTML = `<video controls style="max-width:100%; max-height:250px;"><source src="${mUrl}"></video>`;
        else if (mUrl.includes('/embed/')) pm.innerHTML = `<iframe width="100%" height="220" src="${mUrl}" frameborder="0" allowfullscreen></iframe>`;
        else pm.innerHTML = `<img src="${mUrl}" style="max-width:100%; max-height:250px; object-fit:contain;" />`;
      } else {
        pm.style.display = 'none'; pm.innerHTML = '';
      }
  }

  const delBtn = document.getElementById('delCustomBtn');
  if (delBtn) {
      if(item.cat === 'custom') {
        delBtn.style.display = 'inline-block';
        delBtn.onclick = () => deleteCustomCard(item, delBtn);
      } else delBtn.style.display = 'none';
  }

  const aiBox = document.getElementById('aiBox');
  if (aiBox) {
      aiBox.style.display = 'none';
      aiBox.innerHTML = '';
      aiBox.style.flex = 'none';
      aiBox.style.maxHeight = 'none';
  }
  
  const out = document.getElementById('outBox');
  if (out) { out.innerText = ''; out.className = ''; }

  const panel = document.getElementById('panel');
  if (panel) panel.classList.add('open');
}

async function runCode() {
  const out = document.getElementById('outBox');
  const btn = document.getElementById('runBtn');

  if (!pyReady) {
      if(out) {
          out.innerText = 'Python runtime is still loading... Please wait a moment before running code.'; 
          out.className = 'err';
      }
      return;
  }
  
  if(btn) btn.innerText = 'Running...';
  try {
    // Reset output buffers via python correctly.
    await pyodide.runPythonAsync(`
import sys, io
sys.stdout = io.StringIO()
sys.stderr = io.StringIO()
    `);

    const codeArea = document.getElementById('codeArea');
    if (codeArea) {
        await pyodide.runPythonAsync(codeArea.value);
    }
    
    // Capture stdout and stderr
    const stdout = await pyodide.runPythonAsync(`sys.stdout.getvalue()`);
    const stderr = await pyodide.runPythonAsync(`sys.stderr.getvalue()`);
    const output = (stdout + stderr).trim();

    if (out) {
        out.innerText = output || '(Success - No output)';
        out.className = 'ok';
    }
  } catch (e) { 
      if(out) {
          out.innerText = e.message; 
          out.className = 'err'; 
      }
  }
  if(btn) btn.innerText = '▶ Run Script';
}

function copyCode(){
  const codeArea = document.getElementById('codeArea');
  if(!codeArea) return;
  
  const copyAction = () => {
    const btn = document.getElementById('copyBtn');
    if (btn) {
        const orig=btn.textContent; 
        btn.textContent='✓ COPIED';
        setTimeout(()=>{btn.textContent=orig;},1500);
    }
  };
  
  if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(codeArea.value).then(copyAction).catch(() => {});
  } else {
      codeArea.select();
      try { document.execCommand('copy'); copyAction(); } catch(e) {}
  }
}

}

function deleteCustomCard(itemToRemove, btnEl) {
  if (btnEl.textContent !== '🗑 SURE?') {
    btnEl.textContent = '🗑 SURE?';
    setTimeout(() => { btnEl.textContent = '🗑 DELETE'; }, 3000);
    return;
  }
  const dataIdx = DATA.indexOf(itemToRemove);
  if(dataIdx > -1) DATA.splice(dataIdx, 1);

  let customCards = [];
  try {
      customCards = JSON.parse(localStorage.getItem('neon_py_custom_cards') || '[]');
  } catch (e) {}
  customCards = customCards.filter(c => c.code !== itemToRemove.code || c.desc !== itemToRemove.desc);
  localStorage.setItem('neon_py_custom_cards', JSON.stringify(customCards));

  closePanel();
  renderContent();
}

function toggleAnimationPanel() {
    const panel = document.getElementById('animationPanel');
    if (panel) panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function changeAnimType(val) {
    animationState.animType = val;
}

function useDefaultDragon() {
    mapImage.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Nine_Dragons_detail_%28Chen_Rong%29.jpg/1200px-Nine_Dragons_detail_%28Chen_Rong%29.jpg';
    const panel = document.getElementById('animationPanel');
    if (panel) panel.style.display = 'none';
    generateNodes();
}

function handleMapImage(e) {
    if(e.target.files && e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = f => {
            mapImage.src = f.target.result;
            const panel = document.getElementById('animationPanel');
            if (panel) panel.style.display = 'none';
            generateNodes();
        };
        reader.readAsDataURL(e.target.files[0]);
    }
}

function toggleFullBg() {
    if (localStorage.getItem('ink_py_bg')) {
        localStorage.removeItem('ink_py_bg');
        applyCustomBackground(null);
    } else {
        const bgFileInput = document.getElementById('bgFileInput');
        if (bgFileInput) bgFileInput.click();
    }
}

function handleBgFile(e) {
    if(e.target.files && e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = f => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if(w > 1920) { h *= 1920/w; w = 1920; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                try {
                    localStorage.setItem('ink_py_bg', dataUrl);
                    applyCustomBackground(dataUrl);
                } catch(err) { console.warn("Image too large"); }
            };
            img.src = f.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    }
}

function applyCustomBackground(dataUrl) {
  const customBg = document.getElementById('customBgContainer');
  if (!customBg) return;
  
  if (dataUrl) {
    customBg.style.backgroundImage = `url(${dataUrl})`;
    customBg.style.display = 'block';
    const btn = document.getElementById('toggleFullBgBtn');
    if (btn) btn.innerHTML = '🖼️ CLEAR WALLPAPER';
  } else {
    customBg.style.backgroundImage = 'none';
    customBg.style.display = 'none';
    const btn = document.getElementById('toggleFullBgBtn');
    if (btn) btn.innerHTML = '🖼️ SET WALLPAPER';
  }
}

function processLocalFile(file) {
  const status = document.getElementById('noteStatus');
  if (file.size > 2.5 * 1024 * 1024) {
    if(status) {
        status.textContent = '✗ FILE TOO LARGE (MAX 2.5MB)';
        status.style.color = 'var(--seal-red)';
        setTimeout(() => status.textContent = '', 3000);
    }
    return;
  }
  if(status) {
      status.textContent = '⏳ PROCESSING FILE...';
      status.style.color = 'var(--ink-gray)';
  }
  
  const reader = new FileReader();
  reader.onload = (e) => {
    const input = document.getElementById('noteMedia');
    if(input) {
        input.value = e.target.result;
        input.style.background = 'var(--code-bg)';
        setTimeout(() => input.style.background = 'var(--paper-bg)', 1000);
    }
    
    if(status) {
        status.textContent = '✓ FILE LOADED (' + Math.round(file.size/1024) + 'KB)';
        status.style.color = '#1A4314';
    }
  };
  reader.onerror = () => {
    if(status) {
        status.textContent = '✗ FILE ERROR';
        status.style.color = 'var(--seal-red)';
    }
  };
  reader.readAsDataURL(file);
}

document.addEventListener('DOMContentLoaded', async () => {

  // Load Saved Theme
  const savedTheme = localStorage.getItem('ink_py_theme');
  if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
      const themeBtn = document.getElementById('toggleThemeBtn');
      if (themeBtn) themeBtn.innerHTML = '☀️ ENABLE LIGHT MODE';
  }

  // Load Saved Font
  const savedFont = localStorage.getItem('ink_py_font');
  if (savedFont) {
      const fontSelect = document.getElementById('fontSelect');
      if (fontSelect) fontSelect.value = savedFont;
      changeFontTheme(savedFont);
  }

  // Load Saved AI Persona
  const savedPersona = localStorage.getItem('ink_py_ai_persona');
  if (savedPersona) {
      const personaSelect = document.getElementById('aiPersonaSelect');
      if (personaSelect) personaSelect.value = savedPersona;
      aiPersona = savedPersona;
  }
  updateAILabels();

  // Load saved custom API key
  customApiKey = localStorage.getItem('ink_gemini_api_key') || "";
  const apiInput = document.getElementById('apiInput');
  if (apiInput) apiInput.value = customApiKey;

  // Initialization
  initMapCanvas();
  renderContent();

  window.addEventListener('resize', () => {
      if(!animCanvas) return;
      const container = document.getElementById('mapContainer');
      if (container) {
          animCanvas.width = container.clientWidth;
          animCanvas.height = container.clientHeight;
          generateNodes(); // Recalculate positions
      }
  });

  // Safely Bind File Drag & Drop (HTML DOM elements might not trigger purely via attributes)
  const mediaInput = document.getElementById('noteMedia');
  if (mediaInput) {
      mediaInput.addEventListener('dragover', e => {
        e.preventDefault();
        mediaInput.style.borderColor = 'var(--seal-red)';
        mediaInput.style.background = 'var(--code-bg)';
      });
      mediaInput.addEventListener('dragleave', e => {
        e.preventDefault();
        mediaInput.style.borderColor = 'var(--border-color)';
        mediaInput.style.background = 'var(--paper-bg)';
      });
      mediaInput.addEventListener('drop', e => {
        e.preventDefault();
        mediaInput.style.borderColor = 'var(--border-color)';
        mediaInput.style.background = 'var(--paper-bg)';
        if(e.dataTransfer.files && e.dataTransfer.files[0]) {
          processLocalFile(e.dataTransfer.files[0]);
        }
      });
  }

  const bgFileInput = document.getElementById('bgFileInput');
  if (bgFileInput) {
      bgFileInput.addEventListener('change', e => {
          if(e.target.files && e.target.files[0]) {
              handleBgFile(e);
          }
      });
  }

  const mapImageInput = document.getElementById('mapImageInput');
  if (mapImageInput) {
      mapImageInput.addEventListener('change', e => {
          if(e.target.files && e.target.files[0]) {
              handleMapImage(e);
          }
      });
  }

  const fileInput = document.getElementById('fileInput');
  if (fileInput) {
      fileInput.addEventListener('change', e => {
          if(e.target.files && e.target.files[0]) {
              handleNoteMedia(e);
          }
      });
  }

  let customCards = [];
  try {
      customCards = JSON.parse(localStorage.getItem('neon_py_custom_cards') || '[]');
  } catch(e) {}
  
  // Migrate old scratchpad data if it exists
  const oldNotes = localStorage.getItem('neon_py_notes');
  if (oldNotes) {
    const recoveredCard = {cat:'custom', code:'Recovered Note', desc:'Legacy scratchpad content', ex:oldNotes};
    customCards.push(recoveredCard);
    localStorage.removeItem('neon_py_notes');
    localStorage.setItem('neon_py_custom_cards', JSON.stringify(customCards));
  }
  customCards.forEach(c => DATA.push(c));
  
  const savedBg = localStorage.getItem('ink_py_bg');
  if(savedBg) applyCustomBackground(savedBg);

  try {
    pyodide = await loadPyodide({indexURL:'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/'});
    pyReady = true;
    const rb = document.getElementById('runBtn');
    if (rb) rb.disabled = false;
    const sp = document.getElementById('sP');
    if (sp) sp.textContent = 'READY';
  } catch(e) {
    console.error("Failed to load Pyodide.", e);
  }
});
</script>
</body>
</html>
